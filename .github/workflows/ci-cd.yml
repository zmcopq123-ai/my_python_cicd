name: Python CI/CD 流水线

# 触发条件
on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 任务1：代码质量检查
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: 运行代码风格检查
        run: |
          flake8 app.py test_app.py --max-line-length=100
          echo "✅ 代码风格检查通过"

  # 任务2：测试
  test:
    runs-on: ubuntu-latest
    needs: lint  # 依赖lint任务
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']  # 多版本测试

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行测试并生成覆盖率报告
        run: |
          pytest test_app.py -v --cov=app --cov-report=html
          echo "✅ 测试完成，Python版本: ${{ matrix.python-version }}"

      - name: 上传测试覆盖率报告
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  # 任务3：构建和打包
  build:
    runs-on: ubuntu-latest
    needs: test  # 依赖test任务
    if: false  # 只有推送到main才执行

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装构建工具
        run: |
          pip install build

      - name: 构建包
        run: |
          python -m build
          echo "✅ 构建完成"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/

  # 任务4：部署（模拟）
  deploy:
    runs-on: ubuntu-latest
    needs: build  # 依赖build任务
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 模拟部署
        run: |
          echo "🚀 开始部署..."
          echo "部署到服务器: my-server.com"
          echo "应用版本: $(git describe --tags --always)"
          echo "部署时间: $(date)"
          echo "✅ 部署成功！"

      - name: 创建部署状态标记
        run: |
          echo "## 部署信息" >> $GITHUB_STEP_SUMMARY
          echo "- 状态: 成功 ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 环境: 生产环境" >> $GITHUB_STEP_SUMMARY
          echo "- 版本: $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY

  # 新增：自动部署到Windows电脑B
  deploy-to-windows:
    runs-on: ubuntu-latest
    needs: [ test ]  # 等待测试通过
    if: github.ref == 'refs/heads/main'  # 只有main分支才触发

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 通过SSH连接到Windows电脑B并更新代码
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.110.196  # 【重要】改成电脑B的真实IP
          username: fulai\65762  # 【重要】改成电脑B的用户名
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 开始同步代码到Windows电脑B..."
            cd d:\PythonProject\my_python_cicd
            git pull origin main
            echo "✅ 同步完成！当前代码版本："
            git log -1 --pretty=format:"%h - %s, %cd"